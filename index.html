<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>검 강화하기</title>
    <link href="https://fonts.googleapis.com/css?family=Do+Hyeon:400" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
    <link type="image/x-icon" rel="shortcut icon" href="images/swords/dagger.png"/>

    <script type="module" src="./scripts/main/main.ts"></script>
  </head>
  <body ondragstart="return false">
    <input type="checkbox" id="how-to-play-button" style="position: fixed; z-index: 10;" hidden/>
    <header class="main_header">
      <h1>검 강화하기</h1>
      <label class="how_to_play_button_box green" for="how-to-play-button">
        <div class="how_to_play_button green"> 
          <span>게임방법</span>
          <img src="images/ui/how_to_play.png" alt="how_to_play">
        </div>
        <span class="how_to_play_button_info how_to_play_element left down">화면에 각 요소의 사용법이 표시됩니다.<br/>마우스를 올려 정보를 확인할 수 있습니다.<br/>클릭하여 on/off할 수 있습니다.</span>
      </label>
    </header>
    <main class="main_main" id="main-body"></main>
    <footer class="main_footer">
      <ul>
        <li class="how_to_play_parent"><a id="main-game-button"><div class="icon sword"><img src="images/ui/icons.png" alt="검강화" /></div>검강화</a><span class="how_to_play_element small up right">검강화 화면으로 이동합니다.</span></li>
        <li class="how_to_play_parent"><a id="information-button"><div class="icon information"><img src="images/ui/icons.png" alt="검도감" /></div>검도감</a><span class="how_to_play_element small up right">검도감 화면으로 이동합니다.</span></li>
        <li class="how_to_play_parent"><a id="inventory-button"><div class="icon inventory"><img src="images/ui/icons.png" alt="보관함" /></div>보관함</a><span class="how_to_play_element small up right">보관함 화면으로 이동합니다.</span></li>
        <li class="how_to_play_parent"><a id="making-button"><div class="icon making"><img src="images/ui/icons.png" alt="제작소" /></div>제작소</a><span class="how_to_play_element small up right">제작소 화면으로 이동합니다.</span></li>
        <li class="how_to_play_parent"><a id="stat-button"><div class="icon stat"><img src="images/ui/icons.png" alt="강화소" /></div>강화소</a><span class="how_to_play_element small up right">강화소 화면으로 이동합니다.</span></li>
      </ul>
      <div class="coinbox how_to_play_parent">
        보유자산: <span id="money-number"></span>원 <span id="money-change"></span>
        <div id="money-record"><p class="record_title">최근 기록</p><div id="records"></div></div>
        <span class="how_to_play_element small up left">보유 자산이 표시됩니다.<br/>마우스를 올리면 최근 기록을 확인할 수 있습니다.</span>
      </div>
    </footer>
    <template id="game-interface">
      <div class="swordbox">
        <div class="sword_img_box how_to_play_parent">
          <img id="sword-image" class="sword_img"/>
          <span class="how_to_play_element">검의 이미지가 표시되며,<br>클릭 시 상세 정보를 확인할 수 있습니다.</span>
        </div>
        <section class="infomation">
          <p class="how_to_play_parent"><span id="sword-number" class="sword_number"></span><span class="how_to_play_element up">검의 강화 횟수가 표시됩니다.</span></p>
          <p class="how_to_play_parent"><span id="sword-name" class="sword_name"></span><span class="how_to_play_element up">검 이름이 표시됩니다.</span></p>
          <p class="how_to_play_parent"><span id="sword-prob" class="sword_prob"></span><span class="how_to_play_element up">다음 단계 강화 성공 확률이 표시됩니다.</span></p>
          <p class="how_to_play_parent"><span id="sword-cost" class="sword_info"></span><span class="how_to_play_element up">강화 시 필요한 비용이 표시됩니다.</span></p>
          <p class="how_to_play_parent"><span id="sword-price" class="sword_info"></span><span class="how_to_play_element up">판매 시 얻을 수 있는 금액이 표시됩니다.</span></p>
        </section>
      </div>
      <div id="main-game-button" class="buttons end_sort how_to_play_parent">
        <a class="brown tobottom decrease hide" id="save-button"><img src="images/ui/buttons/save.png" alt="보관하기" /> <span>보관하기</span></a>
        <a class="blue toleft rotate center" id="upgrade-button"><img src="images/ui/buttons/upgrade.png" alt="강화하기" /> <span>강화하기</span></a>
        <a class="red increase hide" id="sell-button"><img src="images/ui/buttons/sell.png" alt="판매하기" /> <span>판매하기</span></a>
        <span class="how_to_play_element small up">보관하기: 검을 보관함에 보관한 뒤 0강부터 다시 시작합니다.<br/>강화하기: 검을 강화합니다. 실패 시 0강으로 초기화됩니다.<br/>판매하기: 검을 판매하고 0강부터 다시 시작합니다.</span>
      </div>
    </template>
    <template id="inventory">
      <div class="window inventory_window">
        <header>보관함</header>
        <main>
          <div class="inventory_items" id="inventory-items"></div>
        </main>
      </div>
    </template>
    <template id="game-information">
      <div class="window sword_book_window">
        <header>검도감</header>
        <main>
          <header class="how_to_play_parent">현재 <span id="found-sword-count" class="found_sword_count">1</span>개의 검 발견<span class="how_to_play_element up">현재 발견한 검의 개수가 표시됩니다.</span></header>
          <div class="swords" id="found-swords"></div></main>
        <p class="tip">검을 클릭해 발견된 검의 상세 정보를 확인할 수 있습니다.</p>
      </div>
    </template>
    <template id="making">
      <div class="window maker_window">
        <header>제작소</header>
        <main>
          <ul class="select_box">
            <li class="how_to_play_parent">
              <input type="radio" name="making_page" id="making-recipes" checked>
              <label for="making-recipes"> 복구권 </label>
              <span class="underline"></span>
              <span class="how_to_play_element up">복구권 제작소를 엽니다.</span>
            </li>
            <li class="how_to_play_parent">
              <input type="radio" name="making_page" id="making-swords">
              <label for="making-swords"> 검 제작 </label>
              <span class="how_to_play_element up">검 제작소을 엽니다.</span>
            </li>
          </ul>
          <div class="recipe_box">
            <section class="recipes" id="repair-recipes"></section>
            <section class="recipes" id="sword-recipes"></section>
          </div>
        </main>
        <p class="tip">발견되지 않은 검을 제외한 아이템을 눌러 상세 정보를 확인할 수 있습니다.</p>
      </div>
    </template>
    <template id="game-stat">
      <div class="window stat_window">
        <header>강화소</header>
        <main>
          <div class="stat_point how_to_play_parent"> 현재 스탯 포인트: <span id="stat-point-count">0</span>개<span class="how_to_play_element small down">현재 가진 스탯 포인트입니다.<br/>스탯 강화 한번 당 하나씩 소모됩니다.<br/>새로운 검을 발견할 때마다 1개씩 얻을 수 있습니다.</span></div>
          <div class="stats" id="stat_box"></div>
          <p class="tip">스탯 포인트는 새로운 검을 발견할 때마다 한개씩 지급됩니다.</p>
        </main>
      </div>
    </template>
    <div class="loading" id="maker-window-lodding"><div class="lodding_img"><img src="images/ui/buttons/make.png" alt="제작하기"/></div></div>
    
    <div id="developer-mod-button"></div>

    <div id="popup-message-box" class="message" style="display: none;"></div>
    <div id="img-loadder" style="display: none;"></div>
  </body>
</html>
